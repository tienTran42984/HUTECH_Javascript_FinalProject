<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login Page</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
         <style>
            body {
                background-color: #f5f7fb;
            }
            .login-card {
                max-width: 420px;
                border-radius: 12px;
            }
            .login-btn {
                background-color: #1e7be6;
                border: none;
            }
            .login-btn:hover {
                background-color: #1669c1;
            }
        </style>
    </head>

    <body>
        <div class="container vh-100 d-flex justify-content-center align-items-center">
            <div class="card login-card shadow-sm p-5">
                <h4 class="text-center mb-4 fw-semibold">Login</h4>

                <form id = "loginForm">
                    <div class="mb-4">
                        <input type="email" class="form-control form-control-lg" id="emailInput"
                            placeholder="Your Email" required>
                    </div>

                    <div class="mb-4">
                        <input type="password" class="form-control form-control-lg" id="passwordInput"
                            placeholder="Password" required>
                    </div>

                    <div class="text-center mb-4">
                        <button type="submit" class="btn btn-primary btn-lg login-btn">
                            Login
                        </button>
                    </div>

                    <p id="loginError" class="text-danger text-center mb-3" style="display:none;"></p>

                    <p class="text-center mb-0">
                        Do not have an account?
                        <a href="register_account.html" class="text-decoration-none">Register here</a>
                    </p>
                </form>
            </div>
        </div>
    </body>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const loginForm = document.getElementById("loginForm")
        const emailInput = document.getElementById("emailInput")
        const passwordInput = document.getElementById("passwordInput")
        const loginError = document.getElementById("loginError");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault()

            const email = emailInput.value.trim()
            const password = passwordInput.value.trim()

            try{

                const response = await axios.post(
                    "http://localhost:5000/api/login",
                    { email,password }
                )

                const user = response.data.user

                localStorage.setItem("loginUser", JSON.stringify(user))

                switch(user.role){

                    case "Instructor":
                        window.location.href="../../Instructor/pages/index.html"
                        break

                    case "Employee":
                        window.location.href="../../Employee/pages/index.html"
                        break

                    case "Learner":
                        window.location.href="../../Learner/pages/index.html"
                        break
                }

            }catch(err){

                loginError.style.display = "block"
                loginError.textContent = err.response.data.message
            }
        })
    </script>
</html>
