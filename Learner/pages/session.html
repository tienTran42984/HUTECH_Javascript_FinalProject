<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Session</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo"></div>
                <h2>E-Learning</h2>
            </div>

            <div class="menu-title">Learner</div>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="my_learning.html" class="active">My Learning</a>
                <a href="settings.html">Settings</a>
            </nav>
        </aside>

        <main class="main">
            <div class="page-header">
                <div>
                    <h1>Learning Session</h1>
                    <p>Study each lesson, mark it complete, and track progress.</p>
                </div>
            </div>

            <div class="learning-layout">
                <aside class="lesson-sidebar">
                    <h2 class="section-title">Lessons</h2>
                    <ul id="lessonList" style="list-style:none;"></ul>
                </aside>

                <section class="video-box">
                    <div class="video-placeholder">Video / Slide Area</div>
                    <h2 id="lessonTitle" class="section-title">Lesson 1 - Introduction</h2>
                    <p style="color: var(--muted); margin-bottom: 18px;">
                        This lesson introduces the core topic and helps the learner understand the roadmap of the course.
                    </p>
                    <button id="completeBtn" class="btn btn-primary">Mark as Complete</button>
                </section>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/session.js"></script>
</body>
</html>
